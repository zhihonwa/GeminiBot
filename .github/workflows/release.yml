name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送以 v 开头的标签（如 v1.0.0）时触发

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build and Pack Windows
        run: |
          npm run build:windows
          # 重命名为统一格式 GeminiBot-v1.0.x-win.exe
          Move-Item -Path "dist-electron\*.exe" -Destination "GeminiBot-${{ github.ref_name }}-Win.exe"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Asset
        uses: softprops/action-gh-release@v2
        with:
          files: GeminiBot-${{ github.ref_name }}-win.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Build Web
        run: npm run build
        env:
          IS_NATIVE: true

      - name: Build Android APK
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          # 重命名为统一格式 GeminiBot-v1.0.x-Android.apk
          cp app/build/outputs/apk/debug/app-debug.apk ../GeminiBot-${{ github.ref_name }}-Android.apk

      - name: Upload Android Asset
        uses: softprops/action-gh-release@v2
        with:
          files: GeminiBot-${{ github.ref_name }}-Android.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
